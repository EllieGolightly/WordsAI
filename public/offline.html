<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4efe6" />
    <title>记忆温室 - 离线中</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Segoe UI", sans-serif;
        background: #f7f3eb;
        color: #5f584e;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(238, 229, 214, 0.72)),
          #f7f3eb;
      }

      .card {
        width: min(100%, 360px);
        border-radius: 20px;
        padding: 24px;
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.56);
        box-shadow: 0 18px 48px rgba(100, 84, 62, 0.1);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 24px;
        font-weight: 650;
        letter-spacing: 0;
        color: #4f493f;
      }

      p {
        margin: 0;
        color: #7b7368;
        font-size: 15px;
        line-height: 1.75;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>离线中</h1>
      <p>已经缓存的页面和本地学习记录仍可使用。等网络恢复后，AI 生词和小结会继续工作。</p>
    </section>
  </body>
</html>
